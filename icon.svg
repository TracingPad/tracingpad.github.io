<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Slate background with safe-zone padding for maskable icon (centre 80%). -->
  <rect width="512" height="512" rx="96" fill="#2d3a3a"/>
  <!-- Chalkboard inner edge -->
  <rect x="56" y="56" width="400" height="400" rx="60" fill="#1f2a2a" stroke="#3f5050" stroke-width="6"/>
  <!-- Big letter "A" drawn in white chalk -->
  <g transform="translate(256 296)" fill="none" stroke="#ffffff" stroke-width="38" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -110 110 L 0 -130 L 110 110"/>
    <path d="M -60 30 L 60 30"/>
  </g>
  <!-- Yellow chalk stub bottom-right -->
  <g transform="translate(380 380) rotate(35)">
    <rect x="-12" y="-50" width="24" height="100" rx="6" fill="#f5d76e"/>
    <rect x="-12" y="-50" width="24" height="14" rx="6" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
